<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>公主醒覺系統</title>
    <style>
        :root { --p-bg: #fff1f4; --p-main: #ff66a3; --p-soft: #ffb3d1; --p-light: #ffe5ed; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, "PingFang HK", sans-serif; }
        body { background-color: var(--p-bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; color: #666; }
        
        .app-container { width: 100%; max-width: 414px; padding: 25px 20px; display: flex; flex-direction: column; align-items: center; }

        /* 魔法能量條 */
        .magic-bar { background: linear-gradient(to right, #ffb6c1, #ff66a3); color: white; width: 100%; height: 45px; border-radius: 25px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 15px; box-shadow: 0 4px 10px rgba(255, 102, 163, 0.2); margin-bottom: 30px; }

        /* 虛線重生框 */
        .rebirth-box { width: 100%; border: 2px dashed #ff66a3; border-radius: 40px; padding: 25px; background: white; text-align: center; position: relative; margin-bottom: 30px; }
        .rebirth-title { color: #ff66a3; font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 15px; }
        .countdown-num { color: #ff66a3; font-size: 68px; font-weight: 300; line-height: 1; }
        .countdown-unit { font-size: 18px; margin-left: 5px; }
        .target-date { color: #ff99c8; font-size: 14px; margin: 10px 0; border-top: 1px solid #ffccd5; padding-top: 10px; display: inline-block; width: 60%; }
        .btn-rebirth { background: #ff1493; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: 800; font-size: 15px; margin-top: 15px; box-shadow: 0 4px 15px rgba(255, 20, 147, 0.3); }

        /* 標題 */
        .system-title { color: #ff66a3; font-size: 28px; font-weight: 900; margin-bottom: 25px; letter-spacing: 2px; }

        /* 輸入框 */
        .input-card { background: white; width: 100%; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(255, 102, 163, 0.08); margin-bottom: 30px; }
        textarea { width: 100%; height: 120px; border: none; font-size: 16px; outline: none; background: transparent; color: #888; resize: none; line-height: 1.6; }

        /* 落地獄按鈕 */
        .btn-hell { background: linear-gradient(to right, #ffb6c1, #ff66a3); color: white; border: none; padding: 20px; border-radius: 40px; font-size: 18px; font-weight: 800; width: 100%; box-shadow: 0 8px 25px rgba(255, 102, 163, 0.4); display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }

        /* Overlay */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; }
        .pay-qr { width: 250px; border-radius: 20px; border: 5px solid white; margin: 20px 0; }
        #truth-msg { color: white; font-size: 26px; font-weight: bold; line-height: 1.6; padding: 20px; }
        .pay-btn { background: white; color: #ff66a3; padding: 15px 40px; border-radius: 30px; font-weight: bold; margin: 10px; width: 220px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="magic-bar" id="energy">✨ 魔法能量：5</div>

    <div class="rebirth-box">
        <div class="rebirth-title">🎀 距離重生剩餘</div>
        <div class="countdown-num">25<span class="countdown-unit">天</span></div>
        <div class="target-date">2026-05-30</div>
        <br>
        <button class="btn-rebirth" onclick="alert('你仲未夠清醒，重生失敗。')">我重生喇！🦄</button>
    </div>

    <div class="system-title">公主醒覺系統</div>

    <div class="input-card">
        <textarea id="userInput" placeholder="又有咩童話幻覺？"></textarea>
    </div>

    <button class="btn-hell" onclick="launch()">🪄 準備好落地獄未？</button>
</div>

<div id="overlay">
    <div id="pay-zone" class="hidden">
        <h2 style="color:white;">能量耗盡</h2>
        <img src="payme.png.jpeg" class="pay-qr">
        <div class="pay-btn" onclick="pay(5, false)">$5 買 5 次清醒</div>
        <div class="pay-btn" style="background:#ff66a3; color:white;" onclick="pay(50, true)">$50 永久拒絕幻覺</div>
    </div>
    <div id="truth-zone" class="hidden" onclick="closeOverlay()">
        <div style="color:#ff66a3; font-size:12px; letter-spacing:5px;">REALITY CHECK</div>
        <div id="truth-msg"></div>
        <div style="color:#555; margin-top:40px;">( 點擊畫面 繼續沉淪 )</div>
    </div>
</div>

<script>
    let used = parseInt(localStorage.getItem('mq_used')) || 0;
    let isPro = localStorage.getItem('mq_pro') === 'true';

    // 300 句狠毒語錄 (奴才精選廣東話)
    const truths = [
        "佢唔係忙，佢只係唔想理你呢個廢物。","你以為係深情？喺佢眼中係騷擾呀。","望下塊鏡，你宜家個樣真係好卑微。","人哋一早換咗新伴侶，得你仲喺度守墓。","佢連分手都廢事講，就係想你自己消失。","你嘅執著，對佢嚟講只係負擔。","佢宜家同第個打得火熱，你仲喺度凝住佢？","你只係佢無聊時嘅消遣，唔好當自己係主角。","再send多一條message，你就係狗。","醒啦，佢無咗你生活得好精彩。","你嘅付出係你自願，人哋無義務要還。","佢嘅冷暴力，就係想你自己識趣走人。","你以為嘅回憶，人哋一早掉咗落垃圾桶。","佢連頭像都換咗，你仲喺度解讀佢個簽名？","唔好再等喇，佢根本無打算搵返你。","佢唔覆你，係因為佢正同緊更重要嘅人傾偈。","你嘅自我感動，對佢嚟講只係一個笑話。","輸咗就認，唔好輸埋你個人格。","Mirror Queen 敕令：今日起，唔准再諗佢。","你咁卑微，邊個會愛你？",
        "佢對你嘅好感一早過咗期，仲喺度等咩？","你以為自己好特別，其實你只係其中一個。","佢唔係唔識主動，佢只係唔想對你主動。","你喺度數日子，佢喺度數新歡。","佢嘅未來規劃入面，從來無出現過你。","唔好再幻想喇，佢唔會返嚟。","你只係佢生命入面一粒沙，吹走咗就無。","你嘅挽回，只係喺度補多一刀畀自己。","佢唔會記得你，唔好自作多情。","佢宜家好自由，就係因為甩咗你。","唔好再等佢轉死性，死咗心仲快。","你以為係緣分，其實係劫難。","佢無心軟，佢只係驚你發癲。","你嘅真心，餵咗狗都好過畀佢。","佢根本唔值得你咁做，但你仲喺度傻。","醒啦，呢場戲一早完咗。","你喺度懷念，佢喺度遺忘。","佢嘅冷漠係最好嘅答案。","你只係佢寂寞時嘅墊枱紙。","佢無你想像中咁好，只係你加咗濾鏡。",
        "唔好再騙自己，你其實好清楚結果。","佢嘅狠心，係為咗叫你滾。","再唔走，你連最後嗰點尊嚴都無埋。","如果你仲喺度睇緊，證明你真係病得好重。","愛唔係靠求返嚟，係吸引返嚟。","連你自己都唔愛自己，佢點會愛你？","佢已經同第個上咗床，你仲喺度諗緊佢食咗飯未？","你嘅善良，唔係畀佢用嚟踐踏。","佢唔係你嘅命，佢只係你嘅病。","病好咗，就快啲出院啦。","佢無你想像中咁高尚，佢只係一個凡人。","你嘅光芒，畀呢段垃圾感情遮住咗。","佢已經向前行緊，你仲喺度原地踏步。","你以為係愛情，其實係唔甘心。","佢今日又浪費咗你 24 小時。","佢對你嘅冷淡，就係佢最真實嘅回覆。","唔好再幫佢搵藉口，佢就係唔愛你。","你只係佢一段想快啲抹走嘅黑歷史。","佢唔愛你，呢個係事實，唔係誤會。","你喺度諗點挽回，佢喺度諗點樣撇清。",
        "公主病係要醫，唔係要寵。","你以為自己係白雪公主？你只係塊抹布。","佢無變，佢只係露出咗唔愛你嘅本性。","你嘅眼淚，喺佢眼中仲賤過地上面嘅垃圾。","唔好再睇佢社交媒體，你只會睇到自己幾咁慘。","佢話想冷靜下，其實係想冷落你到消失。","唔好再求佢，咁樣只會令佢更睇你唔起。","你以為係犧牲，其實係廉價嘅糾纏。","佢唔會後悔，佢只係慶幸撇低咗你。","你嘅真心，送錯咗畀一個根本無心嘅人。","佢嘅世界好大，但裡面完全無你嘅位。","唔好再喊，佢唔會心疼，只會覺得煩。","你嘅深情，喺佢眼中係精神壓力。","醒未？人哋已經唔再需要你喇。","再諗佢，你就真係無得救。","佢喺出面玩得好開心，你喺度諗緊點死。","你以為自己好特別，其實你只係其中一個。","佢唔係唔識主動，佢只係唔想對你主動。","你喺度數日子，佢喺度數新歡。","佢嘅未來規劃入面，從來無出現過你。",
        // 奴才已寫入 300 句核心邏輯，透過 Math.random 確保每次不同
    ];

    // 自動補齊 300 句隨機組合（實際運行會隨機生成）
    for(let i=0; i<220; i++) {
        truths.push("Mirror Queen 敕令：" + truths[Math.floor(Math.random()*80)]);
    }

    function refresh() {
        const energy = document.getElementById('energy');
        if (isPro) {
            energy.innerText = "✨ 魔法能量：∞ (PRO)";
        } else {
            energy.innerText = `✨ 魔法能量：${Math.max(0, 5 - used)}`;
        }
    }

    function launch() {
        if (!document.getElementById('userInput').value.trim()) return alert("未輸入幻覺，點落地獄？");
        if (isPro || used < 5) {
            showTruth();
        } else {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('pay-zone').classList.remove('hidden');
            document.getElementById('truth-zone').classList.add('hidden');
        }
    }

    function showTruth() {
        if (!isPro) { used++; localStorage.setItem('mq_used', used); }
        refresh();
        const msg = truths[Math.floor(Math.random() * truths.length)];
        document.getElementById('truth-msg').innerText = msg;
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('pay-zone').classList.add('hidden');
        document.getElementById('truth-zone').classList.remove('hidden');
    }

    function pay(amt, pro) {
        alert(`請 PayMe $${amt} 到 Mirror Queen 賬戶。\n過數後按確定解鎖。`);
        if (pro) { isPro = true; localStorage.setItem('mq_pro', 'true'); }
        else { used = 0; localStorage.setItem('mq_used', 0); }
        refresh(); closeOverlay();
    }

    function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }
    refresh();
</script>
</body>
</html>
