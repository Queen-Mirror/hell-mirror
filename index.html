    <style>

            --accent-color: #ff66a3;
            --card-bg: #ffffff;
            --text-color: #666;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, "PingFang HK", sans-serif; transition: all 0.4s ease; }
        
        body { 
            background: var(--bg-color); 
            background-attachment: fixed;
            margin: 0; display: flex; justify-content: center; min-height: 100vh; color: var(--text-color);
        }

        /* 移除箭嘴 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .app-container { width: 100%; max-width: 414px; padding: 25px 20px; display: flex; flex-direction: column; align-items: center; }

        .magic-bar { 
            background: var(--accent-color); color: white; width: 100%; height: 45px; border-radius: 25px; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; margin-bottom: 30px;
        }

        .disclaimer { font-size: 13px; font-weight: 900; color: #ff0000; margin-bottom: 10px; letter-spacing: 1.5px; }

        .rebirth-box { 
            width: 100%; border: 2px dashed var(--accent-color); border-radius: 40px; padding: 30px 20px; 
            background: var(--card-bg); text-align: center; margin-bottom: 25px;
        }
        
        .input-group { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .day-input { 
            width: 120px; border: none; border-bottom: 3px solid var(--accent-color); 
            background: transparent; color: var(--accent-color); font-size: 60px; font-weight: 200; text-align: center; outline: none;
        }
        .unit { font-size: 20px; color: var(--accent-color); font-weight: bold; margin-top: 25px; }

        #warning-box { 
            display: none; width: 100%; padding: 25px; border-radius: 20px; background: #000; color: #ff0000; 
            font-weight: 900; line-height: 1.6; text-align: center; border: 2px solid #ff0000; margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(255,0,0,0.4);
        }

        .system-title { color: var(--accent-color); font-size: 26px; font-weight: 900; margin-bottom: 25px; letter-spacing: 2px; }
        .input-card { background: var(--card-bg); width: 100%; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        textarea { width: 100%; height: 120px; border: none; font-size: 17px; outline: none; background: transparent; color: var(--text-color); resize: none; }

        .btn-main { 
            background: var(--accent-color); color: white; border: none; padding: 20px; border-radius: 50px; 
            font-size: 18px; font-weight: 800; width: 100%; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .btn-main:disabled { background: #333; opacity: 0.3; cursor: not-allowed; }

        #truth-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 2000; flex-direction: column; justify-content: center; align-items: center; 
            padding: 40px; text-align: center; background: #000; color: white; 
        }
    </style>
</head>

        "佢連你嘅死活都唔在乎，你仲喺度擔心佢今晚夠唔夠衫著？你真係好慈祥呀。",
        "你嘅卑微換唔到愛，只能換到人哋嘅變本加厲，令佢覺得你可以隨便踐踏。",
        "醒啦！唔好再柒落去，畀返啲面你自己，畀返啲面支持你嘅人！"
    ];

    function applyErosion() {
        const days = parseInt(document.getElementById('dayValue').value) || 0;
        const root = document.documentElement;
        const warn = document.getElementById('warning-box');
        const btn = document.getElementById('actionBtn');

        if (days > 40) {
            warn.style.display = 'block';
            btn.disabled = true;
            root.style.setProperty('--bg-color', '#000000');
            root.style.setProperty('--accent-color', '#ff0000');
            root.style.setProperty('--card-bg', '#111111');
            root.style.setProperty('--text-color', '#ff0000');
            return;
        }

        warn.style.display = 'none';
        btn.disabled = false;

        let ratio = 1 - (days / 40);
        if (ratio < 0) ratio = 0;
        
        const l = 95 - (85 * ratio);
        const s = 100 - (100 * ratio);
        const r = 255 - (155 * ratio);

        root.style.setProperty('--bg-color', days === 0 ? '#000' : `hsl(0, ${s}%, ${l}%)`);
        root.style.setProperty('--accent-color', `rgb(${r}, ${102 * (1-ratio)}, ${163 * (1-ratio)})`);
        root.style.setProperty('--card-bg', `rgba(255, 255, 255, ${1 - (0.9 * ratio)})`);
        root.style.setProperty('--text-color', ratio > 0.7 ? '#ccc' : '#666');
    }

    function showTruth() {
        if (!document.getElementById('userInput').value.trim()) return;
        if (energy < 5) {
            energy++;
            localStorage.setItem('mq_energy', energy);
            document.getElementById('energyStatus').innerText = `✨ 魔法能量：${5 - energy}`;
            document.getElementById('truth-content').innerText = truths[Math.floor(Math.random() * truths.length)];
            document.getElementById('truth-overlay').style.display = 'flex';
        } else {
            alert("能量耗盡，請去過數買清醒。");
        }
    }
</script>
