<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mirror Queen 敕令</title>
    <style>
        :root { --pink-bg: #ffeef2; --pink-accent: #ff66a3; --pink-dark: #ff3385; --yellow: #ffd700; --gold: #d4af37; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--pink-bg); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* 頂部狀態列 */
        .status-bar { background-color: var(--yellow); width: 92%; height: 42px; margin-top: 15px; border-radius: 21px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .header { text-align: center; margin-top: 30px; }
        .header h1 { color: var(--pink-accent); font-size: 28px; margin: 10px 0; font-weight: 800; letter-spacing: 1px; }
        .count-tag { background: white; padding: 4px 15px; border-radius: 20px; color: var(--pink-dark); font-size: 11px; border: 1px solid #ffccd5; font-weight: bold; }

        /* 輸入區域 */
        .card { background: white; width: 88%; max-width: 380px; border-radius: 30px; padding: 25px; margin-top: 30px; box-shadow: 0 10px 30px rgba(255, 102, 163, 0.1); text-align: center; }
        textarea { width: 100%; height: 100px; border: none; font-size: 16px; outline: none; background: transparent; color: #444; resize: none; text-align: center; }
        
        .btn-main { background: linear-gradient(135deg, #ff99c8, #ff66a3); color: white; border: none; padding: 16px; border-radius: 30px; font-size: 18px; font-weight: 700; margin-top: 20px; cursor: pointer; width: 85%; box-shadow: 0 5px 15px rgba(255, 102, 163, 0.3); }

        /* 支付與語錄彈窗 */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; color: white; overflow-y: auto; }
        
        .pay-header { color: var(--yellow); font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .pay-qr { width: 250px; border-radius: 20px; border: 4px solid white; margin: 15px 0; }
        
        .pay-option { background: rgba(255,255,255,0.1); width: 100%; max-width: 300px; padding: 15px; border-radius: 20px; margin: 8px 0; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }
        .pro-badge { color: var(--gold); border: 1px solid var(--gold); padding: 2px 8px; border-radius: 5px; font-size: 10px; vertical-align: middle; margin-left: 5px; }

        #truthText { font-size: 24px; font-weight: bold; padding: 40px; line-height: 1.6; color: white; }
        .hint { color: #666; font-size: 12px; margin-top: 20px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="status-bar" id="island">👸 Mirror Queen 正在審視你的靈魂 📶</div>

    <div class="header">
        <div style="font-size:50px">🪞</div>
        <h1>Mirror Queen</h1>
        <div id="statusTag" class="count-tag">免費剩餘：5 次</div>
    </div>

    <div class="card">
        <textarea id="userInput" placeholder="輸入你段垃圾感情..."></textarea>
    </div>

    <button class="btn-main" onclick="handleAction()">🚀 接受洗禮</button>

    <div id="overlay">
        <!-- 支付牆 -->
        <div id="payContent" class="hidden">
            <div class="pay-header">Mirror Queen</div>
            <p style="color:#aaa; font-size:14px; margin-bottom:10px;">次數已滿，請課金買真話：</p>
            
            <!-- 使用你上傳的 PayCode 圖片 -->
            <img src="payme.png.jpeg" alt="Mirror Queen PayCode" class="pay-qr">
            
            <div class="pay-option" onclick="processPay(5, false)">
                <div style="font-size:18px; font-weight:bold">$5.00 HKD</div>
                <div style="font-size:12px; color:#bbb">解鎖 5 次（單次）</div>
            </div>

            <div class="pay-option" style="border-color: var(--pink-accent); background: rgba(255, 102, 163, 0.15);" onclick="processPay(50, true)">
                <div style="font-size:18px; font-weight:bold; color:var(--pink-accent)">$50.00 HKD</div>
                <div style="font-size:12px; color:#bbb">月費無限次 <span class="pro-badge">PRO</span></div>
            </div>

            <p class="hint" onclick="closeOverlay()">[ 唔敢面對？撳呢度走 ]</p>
        </div>

        <!-- 語錄顯示 -->
        <div id="truthContent" class="hidden" onclick="closeOverlay()">
            <div style="color:var(--pink-accent); font-size:12px; letter-spacing:3px">MIRROR TRUTH</div>
            <div id="truthText"></div>
            <p class="hint">(點擊畫面 繼續接受現實)</p>
        </div>
    </div>

    <script>
        let used = parseInt(localStorage.getItem('mq_used')) || 0;
        let isPro = localStorage.getItem('mq_pro') === 'true';

        const truths = [
            "佢唔係忙，佢只係唔想理你呢個廢物。",
            "你以為係深情？喺佢眼中係騷擾呀。",
            "望下塊鏡，你宜家個樣真係好卑微。",
            "人哋一早換咗新伴侶，得你仲喺度守墓。",
            "佢連分手都廢事講，就係想你自己消失。",
            "你嘅執著，對佢嚟講只係負擔。"
        ];

        function updateUI() {
            const tag = document.getElementById('statusTag');
            const island = document.getElementById('island');
            if (isPro) {
                tag.innerHTML = `PRO 會員 <span class="pro-badge">無限次</span>`;
                tag.style.borderColor = "#d4af37";
                tag.style.color = "#d4af37";
                island.innerText = "👑 Mirror Queen 專屬 PRO 會員";
            } else {
                tag.innerText = `免費剩餘：${Math.max(0, 5 - used)} 次`;
            }
        }

        function handleAction() {
            if (!document.getElementById('userInput').value.trim()) return alert("寫嘢先啦！");
            
            if (isPro || used < 5) {
                showTruth();
            } else {
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('payContent').classList.remove('hidden');
                document.getElementById('truthContent').classList.add('hidden');
            }
        }

        function showTruth() {
            if (!isPro) {
                used++;
                localStorage.setItem('mq_used', used);
            }
            updateUI();
            const txt = truths[Math.floor(Math.random() * truths.length)];
            document.getElementById('truthText').innerText = txt;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('payContent').classList.add('hidden');
            document.getElementById('truthContent').classList.remove('hidden');
        }

        function processPay(amt, setPro) {
            alert(`請 PayMe $${amt} 到 Mirror Queen。\n過數後請重新整理或按確定完成。`);
            if (setPro) {
                isPro = true;
                localStorage.setItem('mq_pro', 'true');
            } else {
                used = 0;
                localStorage.setItem('mq_used', 0);
            }
            updateUI();
            closeOverlay();
        }

        function closeOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }

        updateUI();
    </script>
</body>
</html>
