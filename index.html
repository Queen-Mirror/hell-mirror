<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Queen Mirror | Reborn</title>
    <style>
        :root {
            --accent: #ff4d94;
            --danger: #ff4500;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 防止 App 模式出現捲軸 */
        }

        /* App 容器 */
        .app-container {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top right, #1a0a0a, #000);
        }

        /* 標題區域 */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 專業輸入框 */
        .input-group {
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        input[type="number"] {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 16px;
            outline: none;
            backdrop-filter: blur(10px);
        }

        /* App 按鈕樣式 */
        .btn-action {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary { background: #fff; color: #000; }
        .btn-danger { background: var(--danger); color: #fff; box-shadow: 0 8px 20px rgba(255, 69, 0, 0.3); }

        .btn-action:active { transform: scale(0.96); opacity: 0.8; }

        /* 計時器卡片 (App 風格) */
        .timer-card {
            background: var(--glass);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 30px 20px;
            width: 100%;
            max-width: 350px;
            backdrop-filter: blur(20px);
            text-align: center;
        }

        .timer-label { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        
        .timer-digits {
            font-family: "SF Mono", "Menlo", monospace;
            font-size: 32px;
            font-weight: 700;
            color: var(--danger);
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .digit-group { display: flex; flex-direction: column; align-items: center; }
        .digit-sub { font-size: 10px; color: #555; margin-top: 5px; }

        /* 毒舌內容顯示區 */
        .quote-panel {
            margin-top: 30px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .quote-bubble {
            font-size: 18px;
            line-height: 1.5;
            font-weight: 500;
            color: #eee;
            animation: fadeIn 0.5s ease-out;
        }

        /* 支付底層浮窗 */
        .pay-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            border-top: 1px solid var(--card-border);
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            padding: 40px 24px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            z-index: 100;
            text-align: center;
        }

        .pay-sheet.active { transform: translateY(0); }

        .pay-sheet img { width: 180px; border-radius: 20px; margin: 20px 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="app-container" id="mainApp">
        
        <!-- Step 1: Initial Setup -->
        <div id="setupView" class="input-group">
            <header>
                <h1>QUEEN MIRROR</h1>
                <p style="color: #666; font-size: 14px;">分手重生．清醒系統</p>
            </header>
            <input type="number" id="daysInput" placeholder="重生天數" pattern="\d*">
            <button class="btn-action btn-danger" onclick="startSystem()">啟動隔離程序</button>
        </div>

        <!-- Step 2: Dashboard View -->
        <div id="dashboardView" class="hidden">
            <div class="timer-card">
                <div class="timer-label">距離靈魂恢復期結束</div>
                <div class="timer-digits" id="timerDisplay">
                    <!-- Dynamic digits will be injected here -->
                </div>
                
                <div class="quote-panel">
                    <div id="quoteDisplay" class="quote-bubble">
                        仲掛住嗰個垃圾？<br>撳下面，等我鬧醒你。
                    </div>
                </div>

                <div id="statusInfo" style="font-size: 12px; color: #444; margin-bottom: 10px;">免費診斷剩餘：3 次</div>
                <button class="btn-action btn-primary" onclick="getTruth()">申請毒舌治療</button>
            </div>
        </div>

    </div>

    <!-- Step 3: Bottom Pay Sheet -->
    <div id="paySheet" class="pay-sheet">
        <h2 style="color: var(--danger); margin: 0 0 10px 0;">治療額度已用完</h2>
        <p style="color: #888; font-size: 14px;">你嘅執迷不悟已經超出免費範圍。</p>
        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-top: 15px;">
            <p style="margin: 0; font-size: 14px;">單次加辣鬧醒：<b>$5</b></p>
            <p style="margin: 5px 0 0 0; font-size: 14px; color: var(--accent);">女皇特級修復課程：<b>$50</b></p>
        </div>
        <img src="payme.png.jpeg" alt="PayMe">
        <button class="btn-action btn-primary" style="margin-top: 10px;" onclick="location.reload()">重新開始重生</button>
    </div>
