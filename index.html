<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公主醒覺系統：重生模式</title>
    <style>
        :root {
            --bg-black: #0a0a0a;
            --p-pink: #ff4d94;
            --gold: #ffd700;
        }
        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        #timerBox {
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid var(--gold);
            padding: 10px 20px;
            border-radius: 50px;
            margin-bottom: 30px;
            box-shadow: 0 0 15px var(--gold);
        }
        #timerDisplay {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.2rem;
        }
        .hell-card {
            width: 90%;
            max-width: 400px;
            border: 2px solid #ff0000;
            border-radius: 25px;
            padding: 40px 20px;
            background: linear-gradient(145deg, #1a1a1a, #000);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }
        .btn {
            background: #fff;
            color: #000;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            width: 100%;
            margin-top: 20px;
            font-size: 1.1rem;
        }
        .btn-pay {
            background: var(--p-pink);
            color: #fff;
        }
        #payArea img {
            width: 200px;
            border-radius: 15px;
            margin-top: 20px;
        }
        .quote-text {
            font-size: 1.3rem;
            line-height: 1.6;
            margin: 20px 0;
            min-height: 100px;
        }
        .small-print {
            font-size: 0.8rem;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="setupSection">
        <h1>設定重生倒數</h1>
        <p>比自己幾多日時間清醒？</p>
        <input type="number" id="daysInput" placeholder="輸入天數" style="padding:10px; border-radius:8px; border:none; width:80px; text-align:center;">
        <button class="btn" onclick="startSystem()">開始審判</button>
    </div>

    <div id="trialSection" style="display:none;">
        <div id="timerBox">
            ⌛ 離你自定的重生剩餘：<span id="timerDisplay">00:00:00</span>
        </div>

        <div class="hell-card" id="hell-card">
            <h2 id="statusTitle">💀 審判降臨</h2>
            <div id="quoteDisplay" class="quote-text">準備好面對現實未？</div>
            <p id="freeCount" style="color:var(--p-pink); font-size:0.9rem;">剩餘免費額度：3 次</p>
            <button class="btn" id="magicBtn" onclick="getTruth()">聽取魔鏡審判</button>
        </div>

        <div id="payArea" style="display:none; margin-top:20px;">
            <div class="hell-card">
                <h2>💀 審判降臨</h2>
                <p>死線已到，或者你已經無藥可救。</p>
                <div style="background: #fff; color:#000; padding:15px; border-radius:15px; margin-bottom:10px;"><b>單次鬧醒：$5 (卑微體驗)</b></div>
                <div style="background: var(--p-pink); color:#fff; padding:15px; border-radius:15px;"><b>女皇聖旨：$50 (問下自己：準備好做女皇未？)</b></div>
                <img src="payme.png.jpeg" alt="PayMe QR Code">
                <p class="small-print">付款備註 Email 以便手動解鎖</p>
            </div>
        </div>
    </div>

    <script>
        let timeLeft = 0;
        let trials = 3;
        const truths = [
            "你只係佢排解寂寞嘅廉價勞工。",
            "佢唔係忙，佢只係對你唔感興趣。",
            "你以為自己係唯一，其實你只係備胎之一。",
            "佢連回覆你都懶，你仲喺度幻想緊未來？",
            "佢對你嘅「愛」，仲平過一杯凍檸茶。",
            "你嘅眼淚，喺佢眼中只係麻煩。",
            "佢從來無諗過要同你有結果。"
        ];
        const ending = "你要記住，佢同你咁耐都冇變過，變嘅只係佢對你越嚟越冇興趣。你應該要慶幸佢放過你，你都要放過自己。";

        function startSystem() {
            const days = document.getElementById('daysInput').value;
            if (!days) { alert("請輸入重生天數"); return; }
            timeLeft = days * 24 * 60 * 60;
            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('trialSection').style.display = 'block';
            updateTimer();
            setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            if (timeLeft <= 0) {
                showPayArea();
                return;
            }
            timeLeft--;
            const h = Math.floor(timeLeft / 3600);
            const m = Math.floor((timeLeft % 3600) / 60);
            const s = timeLeft % 60;
            document.getElementById('timerDisplay').innerText = `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function getTruth() {
            if (trials > 0) {
                trials--;
                document.getElementById('freeCount').innerText = `剩餘免費額度：${trials} 次`;
                const randomTruth = truths[Math.floor(Math.random() * truths.length)];
                document.getElementById('quoteDisplay').innerHTML = `${randomTruth}<br><br><span style='font-size:0.9rem; color:#888;'>${ending}</span>`;
            } else {
                showPayArea();
            }
        }

        function showPayArea() {
            document.getElementById('hell-card').style.display = 'none';
            document.getElementById('payArea').style.display = 'block';
        }
    </script>
</body>
</html>
