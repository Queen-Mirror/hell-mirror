    <style>
        /* 核心動態變量 */
        :root {
            --ratio: 0; 
            --bg-color: #fff1f4;
            --accent-color: #ff66a3;
            --card-bg: #ffffff;

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, "PingFang HK", "Microsoft JhengHei", sans-serif; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            background: var(--bg-color); 
            background-attachment: fixed;
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            color: var(--text-color);
        }

        .app-container { width: 100%; max-width: 414px; padding: 25px 20px; display: flex; flex-direction: column; align-items: center; }

        /* 能量條 */
        .magic-bar { 
            background: var(--accent-color); 
            color: white; width: 100%; height: 45px; border-radius: 25px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 14px; margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 重生天數輸入框 */
        .rebirth-box { 
            width: 100%; 
            border: var(--border-style); 
            border-radius: 40px; padding: 25px; 
            background: var(--card-bg); 
            text-align: center; margin-bottom: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .input-group { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .day-input { 
            width: 120px; border: none; border-bottom: 3px solid var(--accent-color); 
            background: transparent; color: var(--accent-color); 
            font-size: 55px; font-weight: 200; text-align: center; outline: none; 
        }
        .unit { font-size: 20px; color: var(--accent-color); font-weight: 600; }

        /* 警告金句 */
        #warning-box { 
            display: none; width: 100%; padding: 20px; border-radius: 20px; 
            background: #000; color: #ff0000; font-weight: bold; 
            line-height: 1.6; text-align: center; border: 2px solid #ff0000;
            margin-bottom: 20px; animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-1px, -2px); }
            40% { transform: translate(-3px, 0px); }
            100% { transform: translate(1px, -1px); }
        }

        .system-title { color: var(--accent-color); font-size: 26px; font-weight: 900; margin-bottom: 25px; letter-spacing: 2px; }

        .input-card { background: var(--card-bg); width: 100%; border-radius: 30px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); margin-bottom: 30px; }
        textarea { width: 100%; height: 120px; border: none; font-size: 17px; outline: none; background: transparent; color: var(--text-color); resize: none; line-height: 1.6; }

        .btn-main { 
            background: var(--accent-color); color: white; border: none; 
            padding: 20px; border-radius: 50px; font-size: 18px; 
            font-weight: 800; width: 100%; cursor: pointer; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        .btn-main:disabled { background: #333; opacity: 0.5; cursor: not-allowed; }

        /* 覆蓋層樣式 */
        #pay-overlay, #truth-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 1000; flex-direction: column; justify-content: center; 
            align-items: center; padding: 30px; text-align: center; background: #000; 
        }
        #truth-text { color: white; font-size: 26px; font-weight: 800; line-height: 1.7; }
    </style>

        const root = document.documentElement;
        const warning = document.getElementById('warning-box');
        const btn = document.getElementById('actionBtn');

        // 【四十日上限邏輯】
        if (days > 40) {
            warning.style.display = 'block';
            btn.disabled = true;
            root.style.setProperty('--bg-color', '#1a0000');
            root.style.setProperty('--accent-color', '#ff0000');
            root.style.setProperty('--card-bg', '#000000');
            root.style.setProperty('--text-color', '#888');
            return;
        }

        warning.style.display = 'none';
        btn.disabled = false;

        // 【天數感應漸變色彩演算法】
        // 40日 = 0% (粉紅), 0日 = 100% (極黑)
        let ratio = 1 - (Math.min(days, 40) / 40);
        
        const lightness = 95 - (85 * ratio); // 95% -> 10%
        const saturation = 100 - (100 * ratio); // 100% -> 0%
        const redVal = 255 - (100 * ratio); // 255 -> 155 (深紅)

        root.style.setProperty('--bg-color', days === 0 ? 'linear-gradient(180deg, #000 0%, #300 100%)' : `hsl(0, ${saturation}%, ${lightness}%)`);
        root.style.setProperty('--accent-color', `rgb(${redVal}, ${102 * (1-ratio)}, ${163 * (1-ratio)})`);
        root.style.setProperty('--card-bg', `rgba(255, 255, 255, ${1 - (0.9 * ratio)})`);
        root.style.setProperty('--text-color', ratio > 0.7 ? '#ddd' : '#666');
        root.style.setProperty('--border-style', days === 0 ? '2px solid #ff0000' : '2px dashed var(--accent-color)');
        
        document.getElementById('statusHint').innerText = days === 0 ? "💀 重生期限已屆滿" : "🎀 輸入重生天數";
    }

    function processReality() {
        if (!document.getElementById('userInput').value.trim()) return alert("未輸入幻覺，點清醒？");
        
        if (energyUsed < 5) {
            energyUsed++;
            localStorage.setItem('mq_energy', energyUsed);
            document.getElementById('energyStatus').innerText = `✨ 魔法能量：${5 - energyUsed}`;
            
            // 隨機抽取語錄
            const msg = truths[Math.floor(Math.random() * truths.length)];
            document.getElementById('truth-text').innerText = msg;
            document.getElementById('truth-overlay').style.display = 'flex';
        } else {
            document.getElementById('pay-overlay').style.display = 'flex';
        }
    }

    function verifyPayment() {
        const btn = document.getElementById('verifyBtn');
        btn.style.display = 'block';
        btn.innerText = "⏳ 正在比對 PayMe 交易流水...";
        
        setTimeout(() => {
            alert("✅ 核實成功！能量已重置。");
            energyUsed = 0;
            localStorage.setItem('mq_energy', 0);
            location.reload();
        }, 3000);
    }

    // 初始化狀態
    updateVisuals();
</script>
</body>
</html>
