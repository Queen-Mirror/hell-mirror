    function startHellTimer(val) {
        const daysVal = parseInt(val) || 0;
        const display = document.getElementById('countdownDisplay');
        clearInterval(mainTimer);
        
        // 40 日攔截邏輯 
        if (daysVal >= 40) {
            display.innerText = "💀 醒下啦！";
            triggerOverlay("你醒下啦，過 40 日根本就係浪費時間，精力，青春。你不如用呢啲時間充實下自己，搵過下家啦，話唔定人哋已經有人接咗手喇");
            return;
        }
        
        if (daysVal <= 0) { display.innerText = "等待輸入..."; return; }
        
        let seconds = daysVal * 86400;
        const update = () => {
            const d = Math.floor(seconds / 86400);
            const h = Math.floor((seconds % 86400) / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            display.innerText = `${d}天 ${h}時 ${m}分 ${s}秒`;
        };
        update();
        mainTimer = setInterval(() => {
            seconds--;
            if (seconds <= 0) { clearInterval(mainTimer); display.innerText = "執迷結束。"; }
            else update();
        }, 1000);
    }
